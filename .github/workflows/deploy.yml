name: Deploy Aethera

on:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyswisseph

      - name: Validate Python syntax
        run: |
          python -m py_compile divination.py
          python -m py_compile aethera_router.py
          echo "Python syntax OK"

      - name: Validate HTML
        run: |
          grep -q 'tab-chat' index.html && echo "Chat tab present"
          grep -q 'human_design' index.html && echo "Human Design tab present"
          echo "HTML structure OK"

  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Aethera to VM
        run: |
          VM_NAME="${{ secrets.VM_NAME || 'managers-dashboard' }}"
          VM_ZONE="${{ secrets.VM_ZONE || 'us-central1-a' }}"

          # Package Aethera files
          tar -czf /tmp/aethera.tar.gz \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.env' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.DS_Store' \
            .
          echo "Package size: $(du -h /tmp/aethera.tar.gz | cut -f1)"

          # Upload to VM
          gcloud compute scp /tmp/aethera.tar.gz \
            "${VM_NAME}:~/aethera.tar.gz" \
            --zone="${VM_ZONE}" \
            --quiet

          # Extract and restart
          gcloud compute ssh "${VM_NAME}" \
            --zone="${VM_ZONE}" \
            --quiet \
            --command="
              sudo mkdir -p /opt/elgringo/products/aethera
              sudo tar -xzf ~/aethera.tar.gz -C /opt/elgringo/products/aethera/
              sudo chown -R root:root /opt/elgringo/products/aethera/
              sudo systemctl restart elgringo-fred-api
              rm ~/aethera.tar.gz
              echo 'Aethera deployed and service restarted'
            "

      - name: Health check
        run: |
          sleep 5
          gcloud compute ssh "${{ secrets.VM_NAME || 'managers-dashboard' }}" \
            --zone="${{ secrets.VM_ZONE || 'us-central1-a' }}" \
            --quiet \
            --command="curl -sf http://localhost:8080/v1/health && echo ' API healthy' || echo 'API health check failed'"
